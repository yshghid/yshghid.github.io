# Configurations
title:            Graph Theory in Computational Biology
longtitle:        SH Youn 
author:           SH Youn
email:            yshggid@gmail.com
description: "Graph Theory in Computational Biology"에는 Computational Biology 논문과 Bioinformatics 툴에 대한 코드가 작성되어 있다. 본 코드는 생물학적으로 전혀 의미가 없는, 최소한의 조건만 만족하는 작은 데이터를 그때그때 생성하여 진행되기 때문에 데이터의 구조와 파이프라인의 흐름을 직관적으로 이해할 수 있게 작성되었다. 코드 진행에 있어 다운받아야하는 데이터는 되도록 최소화하였으나 있을 경우에는 깃허브에서 다운받을 수 있다.


version:          1.0
gitbook_version:  3.2.3

url:              'https://yshghid.github.io'
baseurl:          ''
rss:              RSS

# bootstrap: use the remote theme for the site itself
# remote_theme: sighingnow/jekyll-gitbook

toc:
  enabled: true
  h_min: 1
  h_max: 3

# customize the link favicon in header, will be {{site.baseurl}}/{{site.favicon_path}}
favicon_path:     /assets/gitbook/images/favicon.ico

# markdown render engine.
markdown:         kramdown
kramdown:
  auto_ids:               true
  input:                  GFM
  math_engine:            mathjax
  smart_quotes:           lsquo,rsquo,ldquo,rdquo
  toc_levels:             1..6
  syntax_highlighter:     rouge
  syntax_highlighter_opts:
    guess_lang:           true

syntax_highlighter_style: colorful

markdown_ext:             markdown,mkdown,mkdn,mkd,md

# Permalinks
permalink:                /:categories/:year-:month-:day-:title:output_ext

# Disqus comments
# disqushandler:            sighingnow

exclude:
  - _drafts

collections:
  pages:
    output: true
    permalink: /:collection/:path/

page_width: 800px

destination:      ./_site
incremental:      false
regenerate:       true

plugins:
  - jekyll-feed
  - jekyll-readme-index
  - jemoji
