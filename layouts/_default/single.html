{{ define "main" }}
  <article class="markdown book-article">
    {{ if in .File.Path "previous" }}
    <style>.book-article > div > h1:first-of-type { margin-top: 0 !important; }</style>
    <div style="
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 1.8rem 2rem;
      margin-top: 1rem;
      font-size: 0.88em;
    ">
      {{- .Content -}}
    </div>
    {{ else }}
    {{- .Content -}}
    {{ end }}
  </article>
{{ end }}
