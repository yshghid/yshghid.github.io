    <div id="js-pagination" style="margin-top: 2rem; display: none; justify-content: center; align-items: center; gap: 0.3rem;">
      <a id="prev-btn" onclick="prevPage()" style="padding: 0.3rem 0.6rem; text-decoration: none; cursor: pointer; color: #aaa;">←</a>
      <span id="page-numbers" style="display: flex; gap: 0.3rem;"></span>
      <a id="next-btn" onclick="nextPage()" style="padding: 0.3rem 0.6rem; text-decoration: none; cursor: pointer; color: #aaa;">→</a>
    </div>
  </article>

  <script>
    const POSTS_PER_PAGE = 10;
    let currentPage = 1;
    let activeFilter = null;

    function allItems() {
      return Array.from(document.querySelectorAll('.post-item'));
    }

    function matchingItems() {
      return allItems().filter(el =>
        !activeFilter || (el.dataset.categories || '').split('|').includes(activeFilter)
      );
    }

    function renderPage() {
      const all = allItems();
      const matched = matchingItems();
      const pager = document.getElementById('js-pagination');

      all.forEach(el => el.style.display = 'none');

      const start = (currentPage - 1) * POSTS_PER_PAGE;
      matched.slice(start, start + POSTS_PER_PAGE).forEach(el => el.style.display = '');
      const total = Math.ceil(matched.length / POSTS_PER_PAGE);
      if (pager) {
        const nums = document.getElementById('page-numbers');
        if (nums) {
          nums.innerHTML = '';
          for (let i = 1; i <= total; i++) {
            const btn = document.createElement('a');
            btn.textContent = i;
            btn.onclick = () => goToPage(i);
            btn.style.cssText = `padding: 0.3rem 0.5rem; cursor: pointer; text-decoration: none; color: ${i === currentPage ? '#333' : '#bbb'};`;
            nums.appendChild(btn);
          }
        }
        document.getElementById('prev-btn').style.visibility = currentPage > 1 ? 'visible' : 'hidden';
        document.getElementById('next-btn').style.visibility = currentPage < total ? 'visible' : 'hidden';
        pager.style.display = total > 1 ? 'flex' : 'none';
      }
    }

    function goToPage(n) { currentPage = n; renderPage(); }
    function prevPage() { if (currentPage > 1) { currentPage--; renderPage(); } }
    function nextPage() {
      const total = Math.ceil(matchingItems().length / POSTS_PER_PAGE);
      if (currentPage < total) { currentPage++; renderPage(); }
    }

    function filterByCategory(cat) {
      const filterEl = document.getElementById('active-filter');
      const badges = document.querySelectorAll('#tag-badges span');
      if (!cat || activeFilter === cat) {
        activeFilter = null;
        currentPage = 1;
        if (filterEl) { filterEl.style.display = 'none'; filterEl.dataset.current = ''; }
        badges.forEach(b => b.style.display = '');
      } else {
        activeFilter = cat;
        if (filterEl) { filterEl.style.display = 'none'; }
        badges.forEach(b => b.style.display = b.dataset.cat === cat ? '' : 'none');
      }
      renderPage();
    }

    const h1 = document.querySelector('.book-article h1');
    const tagsEl = document.getElementById('tag-badges');
    const filterEl = document.getElementById('active-filter');
    if (h1 && tagsEl) h1.after(tagsEl);
    if (tagsEl && filterEl) tagsEl.after(filterEl);
    else if (h1 && filterEl) h1.after(filterEl);

    renderPage();
  </script>
